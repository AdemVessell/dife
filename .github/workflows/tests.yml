name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bench]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run DIFE equation smoke test
        run: python -c "from dife import dife; q = dife(3, Q_0=1.0, alpha=0.95, beta=0.01); assert 0 < q < 1, f'Unexpected value {q}'; print(f'DIFE(n=3) = {q:.6f} — smoke test passed')"
